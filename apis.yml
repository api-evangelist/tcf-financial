name: TCF Financial Corporation
description: |-
  Profile for TCF Financial Corporation, a former Detroit-headquartered regional
  bank holding company (Twin City Building and Loan Association, founded 1923).
  TCF was merged into Huntington Bancshares Incorporated on June 9, 2021, and
  the TCF brand was fully retired. This repository is preserved for historical
  record only — TCF Financial no longer operates and exposes no APIs. All
  banking, treasury, deposit, and lending services formerly offered under the
  TCF brand are now operated by Huntington National Bank under the Huntington
  brand. See the huntington-bancshares repository for current API surface (which
  is itself minimal; Huntington exposes no public developer portal).
